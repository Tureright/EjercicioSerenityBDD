serenity {
  project.name = "Serenity Screenplay Google"
  take.screenshots = AFTER_EACH_STEP
}

webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--disable-blink-features=AutomationControlled",
        "--disable-infobars",
        "--start-maximized",
        "--no-sandbox",
        "--disable-dev-shm-usage"
      ]
      excludeSwitches = ["enable-automation"]
      useAutomationExtension = false
    }
  }
}

headless.mode = false